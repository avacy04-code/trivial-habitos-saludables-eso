<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Misión Saludable</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏃 MISIÓN SALUDABLE</h1>

<div id="equipos">

<div class="equipo" onclick="seleccionarEquipo(0)">
<img src="imagenes/avatar1.png">
<p>Dragón</p>
</div>

<div class="equipo" onclick="seleccionarEquipo(1)">
<img src="imagenes/avatar2.png">
<p>Tigre</p>
</div>

<div class="equipo" onclick="seleccionarEquipo(2)">
<img src="imagenes/avatar3.png">
<p>Águila</p>
</div>

<div class="equipo" onclick="seleccionarEquipo(3)">
<img src="imagenes/avatar4.png">
<p>Tiburón</p>
</div>

</div>

<div id="marcador">
Puntos: <span id="puntos">0</span>
</div>

<div id="timerBar">
<div id="timer"></div>
</div>

<div id="pregunta"></div>

<div class="respuestas">

<button class="rojo" onclick="responder(0)" id="r0"></button>
<button class="azul" onclick="responder(1)" id="r1"></button>
<button class="amarillo" onclick="responder(2)" id="r2"></button>
<button class="verde" onclick="responder(3)" id="r3"></button>

</div>

<h2>🎡 Ruleta de retos</h2>

<div id="ruletaContainer">

<div id="flecha">▼</div>
<div id="ruleta"></div>

</div>

<button onclick="girarRuleta()">GIRAR</button>

<div id="reto"></div>

<div id="ranking"></div>

<div id="insignias"></div>

<script src="datos.js"></script>
<script src="script.js"></script>
<script src="ruleta.js"></script>
<script src="sonidos.js"></script>

</body>
</html>
