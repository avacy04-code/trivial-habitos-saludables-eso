<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚑 Misión Primeros Auxilios</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">

    <!-- CABECERA VISUAL -->
    <header class="cabecera hero">
      <div class="hero-overlay">
        <h1>🚑 MISIÓN PRIMEROS AUXILIOS</h1>
        <p class="subtitulo">
          🧠 Aprende · 🏃 Compite · 🏆 Gana
        </p>
      </div>
    </header>

    <!-- PANEL INICIO -->
    <section class="panel" id="panelInicio">

      <h2>⚙️ Configuración de la partida</h2>

      <div class="config-grid">
        <label for="numeroEquipos">Número de equipos</label>
        <input type="number" id="numeroEquipos" min="2" max="12" value="4" />
        <button class="btn principal" onclick="generarCamposEquipos()">
          Generar equipos
        </button>
      </div>

      <div id="camposEquipos" class="campos-equipos"></div>

      <div class="acciones">
        <button class="btn principal grande" onclick="iniciarPartida()">
          ▶️ Empezar partida
        </button>
      </div>

    </section>

    <!-- PANEL JUEGO -->
    <section class="panel oculto" id="panelJuego">

      <!-- BARRA SUPERIOR -->
      <div class="barra-superior">

        <div class="info-box">
          <span class="etiqueta">⏱ Tiempo total</span>
          <span id="tiempoTotal">15:00</span>
        </div>

        <div class="info-box">
          <span class="etiqueta">🔁 Rondas</span>
          <span id="maxRondasTexto">10</span>
        </div>

        <div class="info-box">
          <span class="etiqueta">👥 Equipos</span>
          <span id="totalEquiposTexto">0</span>
        </div>

      </div>

      <!-- ZONA PRINCIPAL -->
      <div class="zona-principal">

        <!-- TABLERO -->
        <main>
          <div id="tableroEquipos" class="tablero-equipos"></div>
        </main>

        <!-- PANEL LATERAL -->
        <aside class="lateral">

          <div class="bloque ranking-destacado">
            <h3>🏆 Ranking</h3>
            <div id="ranking"></div>
          </div>

          <div class="bloque">
            <h3>📊 Estado de equipos</h3>
            <div id="estadoGeneral"></div>
          </div>

          <div class="bloque">
            <h3>📚 Categorías</h3>
            <div class="leyenda">
              <div>❤️ RCP</div>
              <div>🩸 Hemorragias</div>
              <div>🔥 Quemaduras</div>
              <div>🚨 Emergencias</div>
              <div>🦴 Traumatismos</div>
            </div>
          </div>

        </aside>

      </div>

    </section>

    <!-- PANEL FINAL -->
    <section class="panel oculto" id="panelFinal">

      <h2>🏁 Clasificación final</h2>

      <div id="podioFinal" class="podio"></div>

      <div class="acciones">
        <button class="btn principal grande" onclick="reiniciarJuego()">
          🔁 Nueva partida
        </button>
      </div>

    </section>

  </div>

  <!-- SCRIPTS -->
  <script src="datos.js"></script>
  <script src="ruleta.js"></script>
  <script src="sonidos.js"></script>
  <script src="script.js"></script>

</body>
</html>
